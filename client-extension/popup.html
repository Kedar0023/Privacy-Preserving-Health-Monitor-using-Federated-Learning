<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mood Tracker | FL Dataset</title>
  <style>
    body {
      width: 200px;
      font-family: sans-serif;
      padding: 15px;
      margin: 0;
      text-align: center;
      background-color: #f5f5f5;
      color: #333;
    }
    h2 {
      font-size: 14px;
      margin-bottom: 15px;
    }
    .mood-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    .mood-btn:hover {
      background-color: #e2e2e2;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: green;
      height: 15px;
    }
  </style>
</head>
<body>
  <h2>How do you feel right now?</h2>
  
  <div class="mood-container">
    <button class="mood-btn" data-mood="Happy">Happy</button>
    <button class="mood-btn" data-mood="Sad">Sad</button>
    <button class="mood-btn" data-mood="Angry">Angry</button>
    <button class="mood-btn" data-mood="Tired">Tired</button>
    <button class="mood-btn" data-mood="Stressed">Stressed</button>
  </div>
  
  <div id="status"></div>
  
  <script type="module" src="popup.js"></script>
</body>
</html>
