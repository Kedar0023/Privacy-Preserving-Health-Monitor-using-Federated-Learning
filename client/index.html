<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Mood Tracker | FL Dataset</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="header">
    <div class="header-row">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g class="logo-ring">
            <circle cx="12" cy="3" r="1.5" fill="#7b4fff" opacity="0.7" />
            <circle cx="21" cy="8" r="1.5" fill="#7b4fff" opacity="0.7" />
            <circle cx="21" cy="16" r="1.5" fill="#7b4fff" opacity="0.7" />
            <circle cx="12" cy="21" r="1.5" fill="#7b4fff" opacity="0.7" />
            <circle cx="3" cy="16" r="1.5" fill="#7b4fff" opacity="0.7" />
            <circle cx="3" cy="8" r="1.5" fill="#7b4fff" opacity="0.7" />
          </g>
          <circle cx="12" cy="12" r="3.5" fill="#00d4ff" />
          <circle cx="12" cy="12" r="2" fill="#080d14" />
          <circle cx="12" cy="12" r="1" fill="#00d4ff" />
          <line x1="12" y1="8.5" x2="12" y2="4.5" stroke="#00d4ff" stroke-width="0.8" opacity="0.4" />
          <line x1="15" y1="9.5" x2="19" y2="7.5" stroke="#00d4ff" stroke-width="0.8" opacity="0.4" />
          <line x1="15" y1="14.5" x2="19" y2="16.5" stroke="#00d4ff" stroke-width="0.8" opacity="0.4" />
          <line x1="12" y1="15.5" x2="12" y2="19.5" stroke="#00d4ff" stroke-width="0.8" opacity="0.4" />
          <line x1="9" y1="14.5" x2="5" y2="16.5" stroke="#00d4ff" stroke-width="0.8" opacity="0.4" />
          <line x1="9" y1="9.5" x2="5" y2="7.5" stroke="#00d4ff" stroke-width="0.8" opacity="0.4" />
        </svg>
      </div>
      <div class="brand-block">
        <div class="brand-name">Health<span>FL</span></div>
        <div class="brand-sub">Federated Learning Node</div>
      </div>
      <div class="badge">
        <div class="badge-dot"></div>LOCAL
      </div>
    </div>
    <div class="header-caption"><b>Mood check-in</b> — your data never leaves this device</div>
  </div>

  <div class="section">
    <div class="section-label">— Select current state</div>
    <div class="mood-grid">
      <button class="mood-btn" data-mood="Happy"><span class="mood-emoji">😊</span><span
          class="mood-label">Happy</span></button>
      <button class="mood-btn" data-mood="Sad"><span class="mood-emoji">😔</span><span
          class="mood-label">Sad</span></button>
      <button class="mood-btn" data-mood="Angry"><span class="mood-emoji">😤</span><span
          class="mood-label">Angry</span></button>
      <button class="mood-btn" data-mood="Tired"><span class="mood-emoji">😴</span><span
          class="mood-label">Tired</span></button>
      <button class="mood-btn" data-mood="Stressed"><span class="mood-emoji">😰</span><span
          class="mood-label">Stressed</span></button>
    </div>
  </div>

  <div class="fl-strip">
    <div class="fl-hex">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 1.5L13.5 4.75V11.25L8 14.5L2.5 11.25V4.75L8 1.5Z" stroke="#7b4fff" stroke-width="1.2"
          fill="rgba(123,79,255,0.1)" />
        <circle cx="8" cy="8" r="1.8" fill="#7b4fff" opacity="0.8" />
        <circle cx="4.5" cy="5.5" r="0.9" fill="#00d4ff" opacity="0.6" />
        <circle cx="11.5" cy="5.5" r="0.9" fill="#00d4ff" opacity="0.6" />
        <circle cx="4.5" cy="10.5" r="0.9" fill="#00d4ff" opacity="0.6" />
        <circle cx="11.5" cy="10.5" r="0.9" fill="#00d4ff" opacity="0.6" />
        <line x1="5.5" y1="6" x2="7" y2="7.5" stroke="#00d4ff" stroke-width="0.7" opacity="0.4" />
        <line x1="10.5" y1="6" x2="9" y2="7.5" stroke="#00d4ff" stroke-width="0.7" opacity="0.4" />
        <line x1="5.5" y1="10" x2="7" y2="8.5" stroke="#00d4ff" stroke-width="0.7" opacity="0.4" />
        <line x1="10.5" y1="10" x2="9" y2="8.5" stroke="#00d4ff" stroke-width="0.7" opacity="0.4" />
      </svg>
    </div>
    <div class="fl-copy">
      <strong>Federated Privacy Mode</strong>
      Only gradient updates shared · raw data stays local
    </div>
  </div>

  <div class="status-bar">
    <div id="status"></div>
    <div id="dataset-status" style="font-size: 12px; color: #666; margin-top: 5px;"></div>
  </div>

  <div class="confirm-overlay" id="overlay">
    <div class="confirm-ring">
      <svg viewBox="0 0 80 80">
        <circle class="confirm-ring-circle" cx="40" cy="40" r="36" />
      </svg>
      <div class="confirm-check" id="overlay-emoji">😊</div>
    </div>
    <div class="confirm-title" id="overlay-title">Mood Logged</div>
    <div class="confirm-sub" id="overlay-sub">UPDATING LOCAL MODEL…</div>
  </div>

  <script type="module" src="/src/popup.js"></script>
  <script type="module" src="/src/ui.js"></script>
</body>

</html>
