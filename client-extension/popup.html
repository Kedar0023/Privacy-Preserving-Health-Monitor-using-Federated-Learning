<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mood Tracker</title>
  <style>
    /* Styling to make the popup clean, modern, and aesthetically pleasing */
    body {
      width: 250px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 15px;
      margin: 0;
      text-align: center;
      background-color: #f9fafb;
      color: #333;
    }
    h2 {
      font-size: 16px;
      margin-top: 5px;
      margin-bottom: 20px;
      color: #111827;
      font-weight: 600;
    }
    .mood-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .mood-btn {
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background-color: #ffffff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      transition: all 0.2s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }
    .mood-btn:hover {
      background-color: #f3f4f6;
      transform: translateY(-1px);
    }
    
    /* Specific side borders for visual distinctness of moods */
    #btn-great { border-left: 5px solid #10b981; }
    #btn-good  { border-left: 5px solid #3b82f6; }
    #btn-okay  { border-left: 5px solid #f59e0b; }
    #btn-bad   { border-left: 5px solid #ef4444; }
    #btn-awful { border-left: 5px solid #6366f1; }
    
    #status {
      margin-top: 15px;
      font-size: 12px;
      height: 15px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <h2>How are you feeling?</h2>
  
  <div class="mood-container">
    <button class="mood-btn" id="btn-great" data-mood="Great">😁 Great</button>
    <button class="mood-btn" id="btn-good" data-mood="Good">🙂 Good</button>
    <button class="mood-btn" id="btn-okay" data-mood="Okay">😐 Okay</button>
    <button class="mood-btn" id="btn-bad" data-mood="Bad">🙁 Bad</button>
    <button class="mood-btn" id="btn-awful" data-mood="Awful">😫 Awful</button>
  </div>
  
  <div id="status"></div>
  
  <!-- module script type is required to enable ES6 import/export inside popup.js -->
  <script type="module" src="popup.js"></script>
</body>
</html>
